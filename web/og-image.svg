<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g stroke="#1a2332" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>

  <!-- Wind turbine tower -->
  <g>
    <!-- Tower -->
    <rect x="273" y="280" width="8" height="200" rx="2" fill="#8892a0" opacity="0.6"/>
    <!-- Nacelle -->
    <rect x="268" y="268" width="28" height="16" rx="3" fill="#a0aab8"/>
    <!-- Hub -->
    <circle cx="282" cy="276" r="6" fill="#00e676"/>
    <circle cx="282" cy="276" r="3" fill="#0d1117"/>
  </g>

  <!-- Spinning blades (motion lines) -->
  <g stroke="#00e676" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M282 276 L230 210" stroke-dasharray="4 3"/>
    <path d="M282 276 L334 210" stroke-dasharray="4 3"/>
    <path d="M282 276 L282 180" stroke-dasharray="4 3"/>
  </g>
  <!-- Blade arcs -->
  <g fill="none" stroke="#00e676" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <path d="M282 276 L225 204"/>
    <path d="M282 276 L340 204"/>
    <path d="M282 276 L282 168"/>
    <path d="M282 276 L249 248"/>
    <path d="M282 276 L315 248"/>
    <path d="M282 276 L260 238"/>
    <path d="M282 276 L305 238"/>
  </g>

  <!-- Arc indicator (rotation) -->
  <path d="M235 245 A 55 55 0 0 1 330 245" fill="none" stroke="#00e676" stroke-width="1" opacity="0.25" stroke-dasharray="2 4"/>

  <!-- Second turbine (smaller, background) -->
  <g opacity="0.25">
    <rect x="408" y="300" width="4" height="180" rx="1" fill="#8892a0"/>
    <rect x="405" y="292" width="14" height="10" rx="2" fill="#a0aab8"/>
    <circle cx="412" cy="298" r="4" fill="#00e676"/>
    <line x1="412" y1="298" x2="385" y2="260" stroke="#00e676" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="412" y1="298" x2="440" y2="260" stroke="#00e676" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="412" y1="298" x2="412" y2="250" stroke="#00e676" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Third turbine (smallest, distant) -->
  <g opacity="0.15">
    <rect x="478" y="320" width="3" height="160" rx="1" fill="#8892a0"/>
    <circle cx="480" cy="315" r="3" fill="#00e676"/>
    <line x1="480" y1="315" x2="460" y2="285" stroke="#00e676" stroke-width="1" stroke-linecap="round"/>
    <line x1="480" y1="315" x2="500" y2="285" stroke="#00e676" stroke-width="1" stroke-linecap="round"/>
    <line x1="480" y1="315" x2="480" y2="278" stroke="#00e676" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Fluid flow lines (wind) -->
  <g stroke="#00e676" stroke-width="0.8" opacity="0.12" fill="none">
    <path d="M0 350 Q50 345 100 350 Q150 355 200 350 Q250 345 300 350"/>
    <path d="M0 370 Q60 365 120 370 Q180 375 240 370 Q300 365 360 370"/>
    <path d="M0 390 Q55 385 110 390 Q165 395 220 390"/>
    <path d="M0 310 Q40 305 80 310 Q120 315 160 310"/>
  </g>

  <!-- Title -->
  <text x="140" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#f0f6fc" letter-spacing="1">
    Wind Turbine
  </text>
  <text x="140" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#00e676" letter-spacing="1">
    Simulator
  </text>

  <!-- Description -->
  <text x="140" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e" font-weight="400">
    Interactive 3D wind turbine simulation
  </text>
  <text x="140" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e" font-weight="400">
    BEM physics · Live charts · 2D fluid dynamics
  </text>

  <!-- Stats boxes -->
  <g>
    <rect x="140" y="310" width="160" height="54" rx="6" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
    <text x="150" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">POWER COEFFICIENT</text>
    <text x="150" y="353" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f0f6fc">Cp ≤ 0.593</text>
  </g>
  <g>
    <rect x="315" y="310" width="160" height="54" rx="6" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
    <text x="325" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">ROTOR DIAMETER</text>
    <text x="325" y="353" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f0f6fc">2 – 20 m</text>
  </g>
  <g>
    <rect x="490" y="310" width="160" height="54" rx="6" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
    <text x="500" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8b949e">WIND SPEED</text>
    <text x="500" y="353" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f0f6fc">2 – 20 m/s</text>
  </g>

  <!-- TSR indicator -->
  <g>
    <rect x="140" y="380" width="510" height="36" rx="6" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
    <text x="150" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e">
      HAWT · VAWT · Darrieus · H-Rotor · Savonius
    </text>
  </g>

  <!-- Floor -->
  <line x1="0" y1="480" x2="1200" y2="480" stroke="#30363d" stroke-width="1"/>

  <!-- Brand -->
  <text x="140" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#484f58">
    wind-turbine-1ef3d.web.app
  </text>
  <text x="140" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#30363d">
    IEC 61400 Reference
  </text>

  <!-- Data visualization accent -->
  <g opacity="0.3">
    <rect x="680" y="400" width="380" height="80" rx="4" fill="none" stroke="#30363d" stroke-width="0.5"/>
    <!-- Mini chart -->
    <polyline points="690,460 720,440 750,420 780,410 810,405 840,408 870,415 900,430 930,445 960,455 990,460 1020,462 1050,460"
      fill="none" stroke="#00e676" stroke-width="1.5"/>
    <polyline points="690,460 720,445 750,435 780,430 810,428 840,425 870,420 900,418 930,420 960,425 990,435 1020,445 1050,450"
      fill="none" stroke="#ff9100" stroke-width="1" opacity="0.5"/>
    <text x="690" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#484f58">PERFORMANCE CURVES</text>
  </g>

  <!-- Subtle bottom glow -->
  <rect x="0" y="580" width="1200" height="50" fill="url(#glow)" opacity="0.3"/>
</svg>