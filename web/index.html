      <h1 style="font-size: 2.2em; color: #58a6ff; margin-bottom: 0.5em;">Wind Turbine Simulator — Interactive 3D BEM Physics Simulation</h1>
      <p style="font-size: 1.15em; margin-bottom: 1.5em;">Explore wind energy with our interactive 3D wind turbine simulator. Adjust parameters like wind speed, rotor radius, blade count, tip speed ratio, pitch angle, air density, and power coefficient to see real-time performance metrics including power output, RPM, torque, and thrust — all powered by a Blade Element Momentum (BEM) physics engine.</p>

      <h2 style="color: #58a6ff; margin-top: 1.5em; margin-bottom: 0.5em;">What is a Wind Turbine Simulator?</h2>
      <p>A wind turbine simulator is an educational tool that models the aerodynamic and mechanical behavior of wind turbines using physics-based calculations. Our simulator implements the Blade Element Momentum (BEM) theory — the industry-standard method for wind turbine design and analysis. The actuator disk model with Newton-Raphson iteration solves for the axial induction factor, providing accurate real-time performance predictions.</p>

      <h2 style="color: #58a6ff; margin-top: 1.5em; margin-bottom: 0.5em;">Key Features</h2>
      <ul style="margin-left: 1.5em; margin-bottom: 1.5em;">
        <li>Real-time 3D rendering with custom software renderer (no WebGL required)</li>

        <li>Support for HAWT (Horizontal Axis Wind Turbine) and VAWT (Vertical Axis Wind Turbine) designs</li>
        <li>5 turbine presets: Standard HAWT, High-Speed HAWT, High-Torque HAWT, Darrieus VAWT, Savonius VAWT</li>

      <h2 style="color: #58a6ff; margin-top: 1.5em; margin-bottom: 0.5em;">Blade Element Momentum (BEM) Theory</h2>
      <p>The BEM theory combines blade element theory with momentum theory to predict the performance of wind turbine rotors. It divides each blade into segments and calculates the forces acting on each segment based on local flow conditions. The actuator disk model treats the rotor as a permeable disk that extracts energy from the wind. The Newton-Raphson method iteratively solves for the axial induction factor <em>a</em>, where a = 1/3 at the Betz limit (maximum theoretical efficiency of 59.3%). From the induction factor, the simulation computes RPM, torque, thrust, and power output.</p>

      <h2 style="color: #58a6ff; margin-top: 1.5em; margin-bottom: 0.5em;">Turbine Types</h2>
      <h3 style="color: #c9d1d9; margin-top: 1em; margin-bottom: 0.3em;">HAWT (Horizontal Axis Wind Turbine)</h3>
      <p>The most common type of wind turbine, featuring blades that rotate around a horizontal axis. HAWTs must yaw to face the wind direction. Our simulator includes three HAWT presets: Standard (3-blade, 6 m/s rated wind speed), High-Speed (optimized for TSR 9, higher RPM), and High-Torque (optimized for TSR 4, higher torque at lower speeds).</p>
      <h3 style="color: #c9d1d9; margin-top: 1em; margin-bottom: 0.3em;">VAWT (Vertical Axis Wind Turbine)</h3>
      <p>Blades rotate around a vertical axis, making them omnidirectional and eliminating the need for yaw mechanisms. Includes Darrieus VAWT (egg-beater shaped, lift-based design) and Savonius VAWT (S-shaped, drag-based design with lower efficiency but self-starting capability).</p>

      <h2 style="color: #58a6ff; margin-top: 1.5em; margin-bottom: 0.5em;">Wind Power Calculation</h2>
      <p>The power available in wind is given by P = 0.5 · ρ · A · V³, where ρ is air density (default 1.225 kg/m³ at sea level), A is the rotor swept area (π · R²), and V is the wind speed. The actual power extracted by the turbine is P = Cp · 0.5 · ρ · A · V³, where Cp is the power coefficient, theoretically limited by the Betz limit to 16/27 ≈ 0.593. Our simulator allows Cp values from 0.1 to 0.55 with Newton-Raphson convergence adjusting the effective induction factor.</p>

      <h2 style="color: #58a6ff; margin-top: 1.5em; margin-bottom: 0.5em;">IEC 61400 Wind Turbine Standards</h2>
      <p>The International Electrotechnical Commission (IEC) 61400 series provides design requirements, power performance testing, and acoustic noise measurement standards for wind turbines. Our <a href="/standards" style="color: #58a6ff;">standards reference page</a> includes detailed specifications for power performance (IEC 61400-12-1), wind speed bins, air density corrections, and standard turbine classes (I, II, III) with their reference wind speeds and turbulence categories (A, B, C). For the official standards framework, visit the <a href="https://iec.ch/standards/61400" style="color: #58a6ff;" rel="noopener noreferrer">IEC 61400 series page</a>.</p>

      <h2 style="color: #58a6ff; margin-top: 1.5em; margin-bottom: 0.5em;">Frequently Asked Questions</h2>
      <h3 style="color: #c9d1d9; margin-top: 1em; margin-bottom: 0.3em;">How does a wind turbine convert wind to electricity?</h3>
      <p>Wind passes over the turbine blades, creating lift (like an airplane wing) which causes the rotor to spin. The rotational energy is transferred through a shaft to a generator, which converts mechanical energy into electrical energy. The power output depends on wind speed, air density, rotor area, and the turbine's power coefficient Cp, which is limited by the Betz limit to 59.3%.</p>

      <h3 style="color: #c9d1d9; margin-top: 1em; margin-bottom: 0.3em;">What is the optimal tip speed ratio for a wind turbine?</h3>
      <p>The optimal tip speed ratio (TSR) depends on blade count: 2-blade rotors perform best at TSR 6-8, 3-blade at TSR 4-6, and multi-blade designs at lower TSR values (2-4). Optimal TSR balances aerodynamic efficiency with structural and noise constraints. Our simulator provides suggested TSR values when you change blade count.</p>

      <h3 style="color: #c9d1d9; margin-top: 1em; margin-bottom: 0.3em;">How does pitch angle affect turbine performance?</h3>
      <p>Pitch angle controls the blade's angle of attack relative to the wind. At the optimal pitch, the turbine captures maximum power. Increasing pitch (feathering) reduces lift and power — used above rated wind speed to prevent overload. Decreasing pitch (stalling) also reduces power by causing flow separation. The simulator models this with a Gaussian efficiency curve centered on each turbine type's optimal pitch.</p>

      <h3 style="color: #c9d1d9; margin-top: 1em; margin-bottom: 0.3em;">What is the difference between HAWT and VAWT?</h3>
      <p>Horizontal Axis Wind Turbines (HAWTs) have blades rotating around a horizontal axis and must yaw to face the wind — they are the most common type (like modern wind farms). Vertical Axis Wind Turbines (VAWTs) have blades rotating around a vertical axis and are omnidirectional, eliminating yaw mechanisms. Darrieus VAWTs use lift forces (egg-beater shape), while Savonius VAWTs use drag forces (S-shape) with lower efficiency but self-starting capability.</p>
